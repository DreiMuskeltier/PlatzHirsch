---
name: Meta CI

on:
  push:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          sudo apt-get install -y yamllint
          # Use a loose config to avoid minor noise, or just run it
          yamllint -d "{extends: default, rules: {line-length: disable}}" .github/workflows/

      - name: Check for required jobs
        run: |
          grep -q "jobs:" .github/workflows/ci.yml
          grep -q "build:" .github/workflows/ci.yml
          echo "Basic structure check passed."
